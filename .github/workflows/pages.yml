name: Deploy demo to GitHub Pages

# Publishes webapp/ as-is. The frontend detects the missing backend at
# runtime and switches to manual-only demo mode (WebGL export, no auto
# correction). Requires repo Settings → Pages → Source: GitHub Actions.
on:
  push:
    branches: [main]
    paths:
      - "webapp/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: webapp
      - id: deployment
        uses: actions/deploy-pages@v5
